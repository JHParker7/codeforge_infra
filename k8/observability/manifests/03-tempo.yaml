apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: "*"
    helm:
      values: |
        tempo:
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
          retention: 336h  # 14 days
          metricsGenerator:
            enabled: true
            remoteWriteUrl: https://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
                  - local-blocks
        persistence:
          enabled: true
          size: 50Gi
          storageClassName: ceph-rbd
        server:
          http_tls_config:
            cert_file: /etc/tls/tls.crt
            key_file: /etc/tls/tls.key
          grpc_tls_config:
            cert_file: /etc/tls/tls.crt
            key_file: /etc/tls/tls.key
        extraVolumes:
          - name: tls
            secret:
              secretName: tempo-tls
        extraVolumeMounts:
          - name: tls
            mountPath: /etc/tls
            readOnly: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
