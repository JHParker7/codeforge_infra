apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      values: |
        grafana:
          adminSecret: grafana-admin-credentials
          deploymentStrategy:
            type: Recreate
          persistence:
            enabled: true
            storageClassName: ceph-rbd
            size: 10Gi
          grafana.ini:
            server:
              protocol: https
              cert_file: /etc/tls/tls.crt
              cert_key: /etc/tls/tls.key
          extraSecretMounts:
            - name: tls
              secretName: grafana-tls
              mountPath: /etc/tls
              readOnly: true
          additionalDataSources:
            - name: Loki
              type: loki
              url: https://loki.monitoring.svc.cluster.local:3100
              access: proxy
              jsonData:
                tlsSkipVerify: true
            - name: Tempo
              type: tempo
              url: https://tempo.monitoring.svc.cluster.local:3200
              access: proxy
              jsonData:
                tlsSkipVerify: true
                grpcEndpoint: tempo.monitoring.svc.cluster.local:4317
                serviceMap:
                  datasourceUid: prometheus
        prometheus:
          prometheusSpec:
            enableRemoteWriteReceiver: true
            retention: 30d
            web:
              tlsConfig:
                cert:
                  secret:
                    name: prometheus-tls
                    key: tls.crt
                keySecret:
                  name: prometheus-tls
                  key: tls.key
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-rbd
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
