apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "*"
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          server:
            http_tls_config:
              cert_file: /etc/tls/tls.crt
              key_file: /etc/tls/tls.key
            grpc_tls_config:
              cert_file: /etc/tls/tls.crt
              key_file: /etc/tls/tls.key
        singleBinary:
          replicas: 1
          persistence:
            size: 50Gi
            storageClass: ceph-rbd
          extraVolumes:
            - name: tls
              secret:
                secretName: loki-tls
          extraVolumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
        gateway:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        lokiCanary:
          extraArgs:
            - -addr=loki.monitoring.svc.cluster.local:3100
            - -interval=60s
            - -scheme=https
            - -tls-ca-cert-path=/etc/tls/ca.crt
          extraVolumes:
            - name: tls
              secret:
                secretName: loki-tls
          extraVolumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
