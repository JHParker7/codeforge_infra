apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.jhparker.uk
  # Allow ArgoCD to reach the internal git server
  repositories: |
    - url: git@git-server.internal:/usr/local/git/codeforge_infra.git
      type: git
      name: codeforge-infra
