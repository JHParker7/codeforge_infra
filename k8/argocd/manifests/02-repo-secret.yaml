# SSH key for ArgoCD to pull from the internal git server.
# Apply manually — do not commit the real private key.
#   kubectl create secret generic argocd-repo-codeforge \
#     --from-file=sshPrivateKey=~/.ssh/id_ed25519 \
#     -n argocd --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-codeforge
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: git@git-server.internal:/usr/local/git/codeforge_infra.git
  sshPrivateKey: |
    REPLACE_WITH_SSH_PRIVATE_KEY
