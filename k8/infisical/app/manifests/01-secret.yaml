# Bootstrap secret — apply this manually before ArgoCD takes over.
# Do NOT commit real values. Generate values with:
#   ENCRYPTION_KEY: openssl rand -hex 16
#   AUTH_SECRET:    openssl rand -hex 32
#
# Create the infisical Postgres user and database before applying:
#   CREATE USER infisical WITH PASSWORD 'your-password';
#   CREATE DATABASE infisical OWNER infisical;
apiVersion: v1
kind: Secret
metadata:
  name: infisical-secrets
  namespace: infisical
type: Opaque
stringData:
  ENCRYPTION_KEY: REPLACE_WITH_32_HEX_CHARS
  AUTH_SECRET: REPLACE_WITH_64_HEX_CHARS
  DB_CONNECTION_URI: postgresql://infisical:REPLACE_WITH_DB_PASSWORD@db.jhparker.uk:5000/infisical
  REDIS_URL: redis://:REPLACE_WITH_REDIS_PASSWORD@192.168.50.191:6379
