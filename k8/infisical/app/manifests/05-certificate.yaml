apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: infisical-tls
  namespace: infisical
spec:
  secretName: infisical-tls
  dnsNames:
    - infisical.infisical.svc.cluster.local
    - infisical.infisical.svc
    - infisical
  issuerRef:
    name: codeforge-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
