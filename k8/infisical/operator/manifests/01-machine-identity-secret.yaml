# Machine identity credentials for the Infisical operator.
# Create a Universal Auth machine identity in Infisical and populate
# clientId and clientSecret from it. Store the real values in Infisical,
# not here — apply this once manually or via a sealed-secret / external-secret.
apiVersion: v1
kind: Secret
metadata:
  name: machine-identity-credentials
  namespace: infisical-operator-system
  annotations:
    argocd.argoproj.io/sync-options: Skip=true
type: Opaque
