# Template — copy into each app namespace that needs secrets synced from Infisical.
# For encrypted PVCs (secrets-metadata KMS), the managed secret name must match
# the encryptionPassphrase secret referenced in your StorageClass.
#
# 1. Copy this file into the app's manifest directory
# 2. Set namespace, projectSlug, secretsPath, and managedSecretReference.secretName
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: REPLACE_WITH_SECRET_NAME
  namespace: REPLACE_WITH_APP_NAMESPACE
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: machine-identity-credentials
        secretNamespace: infisical-operator-system
      secretsScope:
        projectSlug: REPLACE_WITH_PROJECT_SLUG
        envSlug: prod
        secretsPath: REPLACE_WITH_INFISICAL_PATH
  managedSecretReference:
    secretName: REPLACE_WITH_SECRET_NAME
    secretNamespace: REPLACE_WITH_APP_NAMESPACE
    creationPolicy: Owner
