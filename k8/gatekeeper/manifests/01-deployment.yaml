apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper-deployment
  labels:
    app: gatekeeper
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      containers:
      - name: gatekeeper
        image: ghcr.io/jhparker7/gatekeeper:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "200Mi"
            cpu: "4"
          requests:
            memory: "100Mi"
            cpu: "2"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: gatekeeper
              key: DATABASE_URL
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://localhost:4318"
        - name: TLS_CERT_FILE
          value: "/etc/tls/tls.crt"
        - name: TLS_KEY_FILE
          value: "/etc/tls/tls.key"
        volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:latest
        args:
          - "--config=/etc/otel/config.yaml"
        ports:
        - containerPort: 4317
        - containerPort: 4318
        resources:
          limits:
            memory: "100Mi"
            cpu: "200m"
          requests:
            memory: "50Mi"
            cpu: "100m"
        volumeMounts:
        - name: otel-collector-config
          mountPath: /etc/otel
        - name: tls
          mountPath: /etc/tls
          readOnly: true
      volumes:
      - name: otel-collector-config
        configMap:
          name: otel-collector-config
      - name: tls
        secret:
          secretName: gatekeeper-tls
