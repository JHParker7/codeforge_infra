apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gatekeeper-tls
  namespace: gatekeeper
spec:
  secretName: gatekeeper-tls
  dnsNames:
    - gatekeeper-service.gatekeeper.svc.cluster.local
    - gatekeeper-service.gatekeeper.svc
    - gatekeeper-service
  issuerRef:
    name: codeforge-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
